name: 部署到腾讯云服务器

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: |
          corepack enable
          npm ci

      - name: 构建文档
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: npm run docs:build

      - name: 部署到腾讯云服务器
        # 升级这个 Action 到最新版本
        uses: easingthemes/ssh-deploy@v4.1.8  # 从 v2.1.5 升级到 v4.1.8
        with:  # 注意：v4 版本参数格式有变化
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: root
          REMOTE_PORT: 22
          SOURCE: src/.vuepress/dist/
          TARGET: ${{ secrets.DEPLOY_PATH }}
          ARGS: "-avz --delete"